name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Go API ─────────────────────────────────────────────────────────────────
  go-api:
    name: Go API — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: services/api/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit)
        run: go test ./... -short -v

  # ── Rust daemon ────────────────────────────────────────────────────────────
  rust-daemon:
    name: Rust daemon — build + clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/daemon
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/daemon

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo build
        run: cargo build --release --locked

  # ── Nuxt web panel ─────────────────────────────────────────────────────────
  web-panel:
    name: Nuxt web panel — build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

  # ── Installer scripts ──────────────────────────────────────────────────────
  shellcheck:
    name: Bash installers — shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning

  # ── Container image vulnerability scan ─────────────────────────────────────
  trivy:
    name: Trivy — scan API image
    runs-on: ubuntu-latest
    needs: go-api
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t talepanel-api:ci --target production services/api

      - name: Trivy scan (report only, non-blocking)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: talepanel-api:ci
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
