name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

  # ── Multi-arch container builds ────────────────────────────────────────────
  build-images:
    name: Build and push container images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: talepanel-api
            context: services/api
            target: production
          - name: talepanel-web
            context: apps/web
            target: ""
          - name: talepanel-daemon
            context: services/daemon
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          MINOR="${TAG%.*}"
          IMAGE="${REGISTRY}/${OWNER}/${{ matrix.component.name }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.context }}/Dockerfile
          target: ${{ matrix.component.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tag }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.minor }}
            ${{ steps.tags.outputs.image }}:latest

  # ── Installer checksums and GitHub Release ────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4

      - name: Generate installer checksums
        run: |
          cd scripts
          sha256sum install-panel.sh > install-panel.sh.sha256
          sha256sum install-daemon.sh > install-daemon.sh.sha256
          sha256sum lib/common.sh > lib/common.sh.sha256

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this version — between the matching H2
          # heading and the next H2 heading.
          awk -v tag="$TAG" '
            /^## / { if (seen) exit; if ($0 ~ tag) { seen=1; next } }
            seen { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            scripts/install-panel.sh
            scripts/install-panel.sh.sha256
            scripts/install-daemon.sh
            scripts/install-daemon.sh.sha256
            scripts/lib/common.sh
            scripts/lib/common.sh.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
