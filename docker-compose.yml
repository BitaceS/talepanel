version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# TalePanel — Local Development Docker Compose
#
# Services:
#   postgres   — PostgreSQL 16 (primary database)
#   redis      — Redis 7 (cache + queue)
#   minio      — MinIO (S3-compatible object storage for backups)
#   api        — Go backend (builds from source)
#   web        — Nuxt 3 web panel (dev server)
#   daemon     — Rust node daemon (builds from source)
#
# Usage:
#   cp .env.example .env && editor .env
#   docker compose up -d postgres redis minio
#   docker compose up api web
# ─────────────────────────────────────────────────────────────────────────────

networks:
  talepanel:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mariadb_data:

services:

  # ───────────────────────────────────────────
  # PostgreSQL 16
  # ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: talepanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talepanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-talepanel}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - talepanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talepanel} -d ${POSTGRES_DB:-talepanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────
  # Redis 7
  # ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: talepanel-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: talepanel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────
  # MariaDB 11 (per-server databases)
  # ───────────────────────────────────────────
  mariadb:
    image: mariadb:11-jammy
    container_name: talepanel-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────
  # MinIO bucket initializer (runs once)
  # ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: talepanel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - talepanel
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-changeme};
        mc mb --ignore-existing local/talepanel-backups;
        mc anonymous set none local/talepanel-backups;
        echo 'MinIO bucket initialized';
      "
    restart: "no"

  # ───────────────────────────────────────────
  # Go API Backend
  # ───────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: talepanel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-talepanel}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-talepanel}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGINS: "http://localhost:3000"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: talepanel-backups
      MINIO_USE_SSL: "false"
      DAEMON_SERVERS_DIR: /srv/taledaemon/servers
      CURSEFORGE_API_KEY: ${CURSEFORGE_API_KEY:-}
      CURSEFORGE_GAME_ID: "70216"
      MARIADB_DSN: "root:${MARIADB_ROOT_PASSWORD:-changeme}@tcp(mariadb:3306)/"
      MARIADB_HOST: mariadb
      MARIADB_PORT: "3306"
    ports:
      - "8080:8080"
    networks:
      - talepanel
    volumes:
      - ./services/api:/app   # for hot reload in dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────
  # Nuxt 3 Web Panel
  # ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: talepanel-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    networks:
      - talepanel
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.nuxt

  # ───────────────────────────────────────────
  # Rust Node Daemon (dev node — local)
  # ───────────────────────────────────────────
  daemon:
    build:
      context: ./services/daemon
      dockerfile: Dockerfile
    container_name: talepanel-daemon
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      TALEDAEMON_API_URL: http://api:8080
      TALEDAEMON_NODE_TOKEN: ${DAEMON_NODE_TOKEN:-dev-token-replace-me}
      TALEDAEMON_NODE_ID: ${DAEMON_NODE_ID:-dev-node-00000000-0000-0000-0000-000000000001}
      TALEDAEMON_LISTEN_PORT: "8444"
      TALEDAEMON_DATA_ROOT: /srv/taledaemon
      TALEDAEMON_LOG_LEVEL: debug
      TALEDAEMON_ENV: development
    ports:
      - "8444:8444"
    networks:
      - talepanel
    volumes:
      - ./srv:/srv/taledaemon
