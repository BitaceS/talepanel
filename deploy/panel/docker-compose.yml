# ─────────────────────────────────────────────────────────────────────────────
# TalePanel — Panel Host Docker Compose
#
# Deploys: Postgres, Redis, MinIO, API, Web, Caddy reverse proxy.
# Does NOT deploy the daemon — that lives on a separate host (gameserver host).
# See deploy/daemon/docker-compose.yml for the daemon side.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  talepanel:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

services:

  caddy:
    image: caddy:2-alpine
    container_name: talepanel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - talepanel
    depends_on:
      - web
      - api

  postgres:
    image: postgres:16-alpine
    container_name: talepanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talepanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-talepanel}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talepanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talepanel} -d ${POSTGRES_DB:-talepanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: talepanel-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: talepanel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-talepanel}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: talepanel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - talepanel
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-talepanel} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/talepanel-backups;
        mc anonymous set none local/talepanel-backups;
        echo 'MinIO bucket initialised';
      "
    restart: "no"

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
      target: production
    container_name: talepanel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://${POSTGRES_USER:-talepanel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-talepanel}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      TOTP_ENC_KEY: ${TOTP_ENC_KEY:?TOTP_ENC_KEY is required}
      CORS_ORIGINS: "https://${DOMAIN:?DOMAIN is required}"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-talepanel}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: talepanel-backups
      MINIO_USE_SSL: "false"
      DAEMON_SERVERS_DIR: /srv/taledaemon/servers
      CURSEFORGE_API_KEY: ${CURSEFORGE_API_KEY:-}
      CURSEFORGE_GAME_ID: "70216"
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-solo}
    networks:
      - talepanel
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: "/api/v1"
    container_name: talepanel-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: "/api/v1"
    networks:
      - talepanel
