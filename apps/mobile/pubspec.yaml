name: talepanel_mobile
description: TalePanel Mobile — Hytale server management on the go.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0
  cookie_jar: ^4.0.0
  dio_cookie_manager: ^3.1.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Navigation
  go_router: ^13.2.0

  # UI
  lucide_icons: ^0.0.2
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # Push notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
